# Gitee Pages / Jekyll 配置
# 详细文档：https://gitee.com/help/articles/4136

title: 英语学习新闻博客
description: 通过阅读新闻学习英语，每日更新美股、科技、国际新闻
author: siglea

# Gitee Pages 设置
# 可选：使用自定义域名
domain: siglea.gitee.io/news

# 构建设置
# 如需使用 Jekyll 主题，取消下面注释并指定主题
# theme: minima

# 排除文件（构建时忽略）
exclude:
  - README.md
  - .gitignore
  - LICENSE

# 插件（如需要）
# plugins:
#   - jekyll-feed
#   - jekyll-sitemap

# 默认设置
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default
