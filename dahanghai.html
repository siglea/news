  st.page=n;

  if(n===3){st.pronTapped=false;st.linkDone=false;st.linkCorrect=false;}

};

}

  var post=' revealed a consistent pattern of cognitive decline in participants.';

  var modEl;

  } else {
    modEl='<span onclick="_dhFold()" style="display:inline-block;background:'+GA+';border:0.5px solid rgba(212,168,67,0.45);border-radius:20px;color:'+GOLD+';font-size:11px;padding:2px 10px;cursor:pointer;vertical-align:middle;margin:0 2px;">[修饰]</span>';
  }

    ?'<div style="background:'+TA+';border:0.5px solid rgba(29,158,117,0.22);border-radius:13px;padding:13px 15px;margin-top:14px;">'

     +'<span style="font-size:12px;color:'+GOLD+';">点击金色高亮区域进行折叠</span></div>';

  var btnHtml=st.folded

  return '<div style="padding:12px 20px 28px;color:'+TX+';">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">'
    +back(1)
    +'<span style="font-size:12px;color:'+TXS+';">折叠练习</span></div>'

    +'<div style="background:'+BGC+';border:0.5px solid '+BDR+';border-radius:16px;padding:18px;">'
    +'<div style="font-size:11px;color:'+TXS+';font-weight:500;margin-bottom:11px;letter-spacing:0.5px;">训练句 · 考研英语阅读</div>'

    +coreHtml

function linking(){

    var col=st.linkCorrect?TEAL:RED;

      +'</div></div>';
  }

  var feedHtml='';
  if(step==='done'){
    if(st.linkCorrect){
      feedHtml='<div style="background:'+TA+';border:0.5px solid rgba(29,158,117,0.25);border-radius:13px;padding:14px;margin-top:13px;">'
        +'<div style="display:flex;align-items:flex-start;gap:9px;">'
        +'<svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;margin-top:2px;"><circle cx="8" cy="8" r="7" stroke="'+TEAL+'" stroke-width="1.2"/><path d="M5 8L7 10L11 6" stroke="'+TEAL+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'

    } else {
      feedHtml='<div style="background:'+RA+';border:0.5px solid rgba(226,96,96,0.25);border-radius:13px;padding:14px;margin-top:13px;">'
        +'<div style="display:flex;align-items:flex-start;gap:9px;">'

    }
  }

  var btnHtml='';
  if(step==='init'){
    btnHtml='<button disabled style="width:100%;padding:15px;background:'+BGE+';color:'+TXD+';border:none;border-radius:16px;font-size:15px;font-weight:500;cursor:not-allowed;font-family:var(--font-sans);">请先点击代词</button>';
  } else if(step==='done'){
    btnHtml=pbtn('查看训练结果 →','_dh(4)');
  }

  var hintHtml = step==='init'
    ? '<div style="background:'+BA+';border:0.5px solid rgba(74,159,224,0.18);border-radius:11px;padding:10px 13px;margin-top:10px;display:flex;align-items:center;gap:8px;">'
      +'<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6.5" stroke="'+BLUE+'" stroke-width="1"/><path d="M7 6V10" stroke="'+BLUE+'" stroke-width="1.5" stroke-linecap="round"/><circle cx="7" cy="4" r="0.8" fill="'+BLUE+'"/></svg>'
      +'<span style="font-size:12px;color:'+BLUE+';">点击蓝色代词 "They" 开始连线</span></div>'
    : '';

  return '<div style="padding:12px 20px 28px;color:'+TX+';">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">'
    +back(2)
    +'<span style="font-size:12px;color:'+TXS+';">连线练习</span></div>'
    +pbar(2,3)

    +'<div style="margin-bottom:16px;">'
    +'<div style="font-size:17px;font-weight:500;color:'+TX+';margin-bottom:7px;">恢复指代关系</div>'
    +'<div style="font-size:13px;color:'+TXS+';line-height:1.65;">找出代词 "They" 所指代的实体，建立跨句指代连接。</div></div>'

    +'<div style="background:'+BGC+';border:0.5px solid '+BDR+';border-radius:16px;padding:17px;">'
    +'<div style="font-size:11px;color:'+TXS+';font-weight:500;margin-bottom:11px;letter-spacing:0.5px;">训练句组 · 考研英语阅读</div>'
    +'<div style="font-size:14px;color:'+TX+';line-height:1.82;margin-bottom:11px;">'
    +'<span style="color:'+TEAL+';font-weight:500;">Scientists</span> claimed that ocean temperatures have risen dramatically over the past decade.</div>'
    +'<div style="height:0.5px;background:'+BDR+';margin-bottom:11px;"></div>'
    +'<div style="font-size:14px;color:'+TX+';line-height:1.82;">'
    +'<span '+pronClick+' style="'+pronStyle+'">They</span>'
    +' warned that marine ecosystems could collapse within decades if action is not taken.</div></div>'

    +hintHtml+optHtml+feedHtml

    +'<div style="margin-top:18px;">'+btnHtml+'</div>'
    +'</div>';
}
